<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralFactory | Automated Content</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="logo">ViralFactory</div>
            <div class="nav-links">
                <a href="#" class="active">Editor</a>
                <a href="#">Calendario</a>
                <a href="#">Ajustes</a>
            </div>
        </nav>

        <main class="content">
            <header class="hero">
                <h1>Tu contenido, en piloto automático.</h1>
                <p>Sube tu video crudo. Nosotros hacemos el resto.</p>
            </header>

            <div class="upload-zone" id="drop-zone">
                <div class="upload-content" style="pointer-events: none;">
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <h2>Arrastra tu video aquí</h2>
                    <p>O haz clic para seleccionar un archivo</p>
                </div>
                <input type="file" id="file-input" hidden accept="video/*">
            </div>

            <section class="queue-section">
                <div class="queue-header">
                    <h3>Cola de Procesamiento</h3>
                    <span class="badge" id="video-count">0 videos</span>
                </div>
                <div id="video-list">
                    <p class="text-zinc-500 text-center py-10">Conectando con la base de datos...</p>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
